<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
    <ion-title>Favourites</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div *ngIf="favourites.length === 0">
    <p>No favourite movies yet.</p>
  </div>

  <ion-list *ngIf="favourites.length > 0">
    <ion-item *ngFor="let movie of favourites">
      <ion-label>{{ movie.title }}</ion-label>
      <ion-button slot="end" [routerLink]="['/movie-details', movie.id]">
        Details
      </ion-button>
    </ion-item>
  </ion-list>
</ion-content>
